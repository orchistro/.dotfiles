[general]
import = [
  # uncomment the flavour you want below:
  "~/.config/alacritty/catppuccin-latte.toml"
  # "~/.config/alacritty/catppuccin-frappe.toml"
  # "~/.config/alacritty/catppuccin-macchiato.toml"
  # "~/.config/alacritty/catppuccin-mocha.toml"
]

[env]
TERM = "xterm-256color"

[window]
dimensions.columns = 194
dimensions.lines = 51
option_as_alt = "Both"
padding = { x = 1, y = 2 }
resize_increments = true

[font]
normal = { family = "JetBrainsMono Nerd Font Propo", style = "Light" }
# bold = { family = "JetBrainsMono Nerd Font Propo", style = "Bold" }
# italic = { family = "JetBrainsMono Nerd Font Propo", style = "Italic" }
# bold_italic = { family = "JetBrainsMono Nerd Font Propo", style = "Bold Italic" }

size = 13
offset.x = 0
offset.y = 1
builtin_box_drawing = true

[cursor]
style.blinking = "Never"

[keyboard]
bindings = [
  { key = "N", mods = "Command", action = "CreateNewWindow" },
  { key = "N", mods = "Command|Shift", action = "SpawnNewInstance" },
]

[mouse]
# hide_when_typing = true

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t/.-"

[colors]
draw_bold_text_with_bright_colors = true
